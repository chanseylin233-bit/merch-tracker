<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>便签纸图标风格演示</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #f5f0eb 0%, #e8f4fc 50%, #fef0f5 100%);
      min-height: 100vh;
      padding: 40px 20px;
    }
    
    h1 {
      text-align: center;
      color: #2d3748;
      margin-bottom: 20px;
      font-size: 24px;
    }
    
    h2 {
      color: #4a5568;
      font-size: 18px;
      margin: 30px 0 15px;
      padding-left: 10px;
      border-left: 3px solid #a78bfa;
    }
    
    .demo-section {
      max-width: 800px;
      margin: 0 auto;
    }
    
    .icon-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin-bottom: 30px;
    }
    
    /* ===== 便签纸风格图标 ===== */
    .icon-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 20px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    
    .icon-card span {
      font-size: 12px;
      color: #718096;
    }
    
    /* 方案 B：便签纸背景 + 描边 */
    .icon-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: #CAE0FF;
      border: 2.5px solid #1A5F8E;
    }
    
    .icon-badge svg {
      width: 24px;
      height: 24px;
      stroke: #1A5F8E;
      stroke-width: 2;
    }
    
    /* ===== 粉紫主题适配版 ===== */
    .icon-badge-pink {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: #fce4ec;
      border: 2.5px solid #be185d;
    }
    
    .icon-badge-pink svg {
      width: 24px;
      height: 24px;
      stroke: #be185d;
      stroke-width: 2;
    }
    
    .icon-badge-purple {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: #ede7f6;
      border: 2.5px solid #6b21a8;
    }
    
    .icon-badge-purple svg {
      width: 24px;
      height: 24px;
      stroke: #6b21a8;
      stroke-width: 2;
    }
    
    /* ===== 大尺寸变体 ===== */
    .icon-badge-lg {
      width: 64px;
      height: 64px;
      border-radius: 18px;
    }
    
    .icon-badge-lg svg {
      width: 32px;
      height: 32px;
    }
    
    /* ===== 应用场景演示 ===== */
    .app-demo {
      background: white;
      border-radius: 16px;
      padding: 24px;
      margin-top: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    
    .app-demo-title {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    
    .app-demo-title h3 {
      font-size: 18px;
      color: #2d3748;
    }
    
    .app-demo-content {
      display: flex;
      gap: 12px;
    }
    
    .stat-card {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 16px;
      background: #fef7f9;
      border-radius: 12px;
    }
    
    .stat-card .icon-badge-pink {
      width: 40px;
      height: 40px;
      border-radius: 12px;
    }
    
    .stat-card .icon-badge-pink svg {
      width: 20px;
      height: 20px;
    }
    
    .stat-card .value {
      font-size: 20px;
      font-weight: 700;
      color: #be185d;
    }
    
    .stat-card .label {
      font-size: 12px;
      color: #718096;
    }
    
    .note {
      margin-top: 20px;
      padding: 12px 16px;
      background: #fffbeb;
      border-left: 3px solid #f59e0b;
      border-radius: 0 8px 8px 0;
      font-size: 14px;
      color: #92400e;
    }
  </style>
</head>
<body>
  <h1>📋 便签纸图标风格演示</h1>
  
  <div class="demo-section">
    <h2>蓝色原版（iconfont 集合风格）</h2>
    <div class="icon-grid">
      <div class="icon-card">
        <div class="icon-badge">
          <i data-lucide="clipboard-list"></i>
        </div>
        <span>ClipboardList</span>
      </div>
      
      <div class="icon-card">
        <div class="icon-badge">
          <i data-lucide="credit-card"></i>
        </div>
        <span>CreditCard</span>
      </div>
      
      <div class="icon-card">
        <div class="icon-badge">
          <i data-lucide="shopping-bag"></i>
        </div>
        <span>ShoppingBag</span>
      </div>
      
      <div class="icon-card">
        <div class="icon-badge">
          <i data-lucide="heart"></i>
        </div>
        <span>Heart</span>
      </div>
      
      <div class="icon-card">
        <div class="icon-badge">
          <i data-lucide="package"></i>
        </div>
        <span>Package</span>
      </div>
      
      <div class="icon-card">
        <div class="icon-badge">
          <i data-lucide="save"></i>
        </div>
        <span>Save</span>
      </div>
      
      <div class="icon-card">
        <div class="icon-badge">
          <i data-lucide="edit-3"></i>
        </div>
        <span>Edit3</span>
      </div>
      
      <div class="icon-card">
        <div class="icon-badge">
          <i data-lucide="settings"></i>
        </div>
        <span>Settings</span>
      </div>
    </div>
    
    <h2>粉紫主题适配版</h2>
    <div class="icon-grid">
      <div class="icon-card">
        <div class="icon-badge-pink">
          <i data-lucide="clipboard-list"></i>
        </div>
        <span>粉色</span>
      </div>
      
      <div class="icon-card">
        <div class="icon-badge-purple">
          <i data-lucide="clipboard-list"></i>
        </div>
        <span>紫色</span>
      </div>
      
      <div class="icon-card">
        <div class="icon-badge-pink">
          <i data-lucide="credit-card"></i>
        </div>
        <span>粉色</span>
      </div>
      
      <div class="icon-card">
        <div class="icon-badge-purple">
          <i data-lucide="credit-card"></i>
        </div>
        <span>紫色</span>
      </div>
    </div>
    
    <h2>大尺寸变体</h2>
    <div class="icon-grid">
      <div class="icon-card">
        <div class="icon-badge icon-badge-lg">
          <i data-lucide="home"></i>
        </div>
        <span>大号蓝色</span>
      </div>
      
      <div class="icon-card">
        <div class="icon-badge-pink icon-badge-lg">
          <i data-lucide="home"></i>
        </div>
        <span>大号粉色</span>
      </div>
      
      <div class="icon-card">
        <div class="icon-badge-purple icon-badge-lg">
          <i data-lucide="home"></i>
        </div>
        <span>大号紫色</span>
      </div>
    </div>
    
    <h2>实际应用场景</h2>
    <div class="app-demo">
      <div class="app-demo-title">
        <div class="icon-badge-pink">
          <i data-lucide="clipboard-list"></i>
        </div>
        <h3>苏茜周边拼团账本 ✨</h3>
      </div>
      
      <div class="app-demo-content">
        <div class="stat-card">
          <div class="icon-badge-pink">
            <i data-lucide="shopping-bag"></i>
          </div>
          <div class="value">128</div>
          <div class="label">总记录</div>
        </div>
        
        <div class="stat-card">
          <div class="icon-badge-pink">
            <i data-lucide="package"></i>
          </div>
          <div class="value">23</div>
          <div class="label">待发货</div>
        </div>
        
        <div class="stat-card">
          <div class="icon-badge-pink">
            <i data-lucide="credit-card"></i>
          </div>
          <div class="value">¥5,680</div>
          <div class="label">待付款</div>
        </div>
      </div>
    </div>
    
    <div class="note">
      💡 <strong>方案 B 优势：</strong>保留 lucide-react，无需下载 SVG；通过 CSS 类 .icon-badge 实现便签纸效果；颜色可动态适配主题。
    </div>
  </div>
  
  <script>
    lucide.createIcons();
  </script>
</body>
</html>
